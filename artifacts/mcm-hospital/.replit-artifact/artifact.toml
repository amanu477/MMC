kind = "web"
previewPath = "/"
title = "MCM Korean Hospital"
version = "1.0.0"
id = "artifacts/mcm-hospital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22131

[services.development]
run = "pnpm --filter @workspace/mcm-hospital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mcm-hospital", "run", "build" ]
publicDir = "artifacts/mcm-hospital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22131"
BASE_PATH = "/"
